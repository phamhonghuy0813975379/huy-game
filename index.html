<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Đá Banh</title>
<style>
    body {
        text-align: center;
        font-family: Arial;
        background: #4CAF50;
        color: white;
    }

    #game {
        position: relative;
        width: 400px;
        height: 300px;
        margin: auto;
        background: #2e7d32;
        border: 3px solid white;
    }

    #goal {
        position: absolute;
        top: 20px;
        left: 50px;
        width: 300px;
        height: 100px;
        border: 3px solid white;
    }

    #goalkeeper {
        position: absolute;
        top: 60px;
        left: 150px;
        width: 60px;
        height: 60px;
        background: black;
        border-radius: 50%;
    }

    #ball {
        position: absolute;
        bottom: 20px;
        left: 180px;
        width: 30px;
        height: 30px;
        background: white;
        border-radius: 50%;
    }

    button {
        margin: 5px;
        padding: 10px;
        font-size: 16px;
    }

    #level {
        margin-top: 10px;
        font-size: 20px;
    }
</style>
</head>

<body>

<h2>⚽ Game Đá Banh</h2>

<div id="game">
    <div id="goal"></div>
    <div id="goalkeeper"></div>
    <div id="ball"></div>
</div>

<div>
    <button onclick="shoot('left')">Sút Trái</button>
    <button onclick="shoot('center')">Sút Giữa</button>
    <button onclick="shoot('right')">Sút Phải</button>
</div>

<div id="level">Level: 1</div>

<script>
let level = 1;

function shoot(direction) {
    const ball = document.getElementById("ball");
    const keeper = document.getElementById("goalkeeper");

    // Random hướng thủ môn
    const directions = ["left", "center", "right"];
    const keeperMove = directions[Math.floor(Math.random() * 3)];

    // Di chuyển thủ môn
    if (keeperMove === "left") keeper.style.left = "80px";
    if (keeperMove === "center") keeper.style.left = "150px";
    if (keeperMove === "right") keeper.style.left = "220px";

    // Di chuyển bóng
    if (direction === "left") ball.style.left = "80px";
    if (direction === "center") ball.style.left = "180px";
    if (direction === "right") ball.style.left = "280px";

    ball.style.bottom = "200px";

    setTimeout(() => {
        if (direction !== keeperMove) {
            alert("⚽ Ghi bàn!");
            level++;
        } else {
            alert("❌ Bị cản phá!");
        }

        document.getElementById("level").innerText = "Level: " + level;

        // Reset vị trí
        ball.style.bottom = "20px";
        ball.style.left = "180px";
        keeper.style.left = "150px";
    }, 500);
}
</script>

</body>
</html>
