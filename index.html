<script>
let level = 1;
let score = 0;

const keeper = document.getElementById("keeper");

// Sút bóng
function shoot(direction) {
    const ball = document.getElementById("ball");

    let targetX;
    if (direction === "left") targetX = 180;
    if (direction === "center") targetX = 290;
    if (direction === "right") targetX = 380;

    // Thủ môn chọn hướng ngẫu nhiên
    const directions = ["left", "center", "right"];
    const keeperChoice = directions[Math.floor(Math.random() * 3)];

    let keeperTarget;
    if (keeperChoice === "left") keeperTarget = 180;
    if (keeperChoice === "center") keeperTarget = 290;
    if (keeperChoice === "right") keeperTarget = 380;

    // Animation thủ môn lao
    keeper.style.transition = "0.3s";
    keeper.style.left = keeperTarget + "px";

    // Bóng bay
    ball.style.left = targetX + "px";
    ball.style.bottom = "280px";

    setTimeout(() => {

        if (direction === keeperChoice) {
            alert("🧤 Khê đoán đúng và bắt được!");
        } else {
            alert("⚽ Huy ghi bàn!");
            score++;

            if (score % 3 === 0) {
                level++;
            }
        }

        document.getElementById("info").innerText =
            "Level: " + level + " | Score: " + score;

        // reset vị trí
        ball.style.bottom = "60px";
        ball.style.left = "285px";
        keeper.style.left = "260px";

    }, 400);
}
</script>
