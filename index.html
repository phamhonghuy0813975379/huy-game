<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>FIFA Mini</title>

<style>
body {
    text-align: center;
    background: linear-gradient(#4CAF50, #2e7d32);
    font-family: Arial;
    color: white;
}

#game {
    position: relative;
    width: 500px;
    height: 350px;
    margin: auto;
    border: 4px solid white;
    background: #388e3c;
    overflow: hidden;
}

#goal {
    position: absolute;
    top: 20px;
    left: 100px;
    width: 300px;
    height: 120px;
    border: 4px solid white;
}

#keeper {
    position: absolute;
    top: 60px;
    left: 200px;
    width: 70px;
    height: 70px;
    background: black;
    border-radius: 50%;
    transition: 0.2s;
}

#player {
    position: absolute;
    bottom: 20px;
    left: 220px;
    width: 60px;
    height: 60px;
    background: blue;
    border-radius: 50%;
}

#ball {
    position: absolute;
    bottom: 50px;
    left: 240px;
    width: 25px;
    height: 25px;
    background: white;
    border-radius: 50%;
    transition: 0.4s;
}

button {
    padding: 10px 15px;
    margin: 5px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#info {
    margin-top: 10px;
    font-size: 18px;
}
</style>

</head>

<body>

<h2>⚽ FIFA MINI</h2>

<div id="game">
    <div id="goal"></div>
    <div id="keeper"></div>
    <div id="player"></div>
    <div id="ball"></div>
</div>

<div>
    <button onclick="shoot('left')">⬅ Trái</button>
    <button onclick="shoot('center')">⬆ Giữa</button>
    <button onclick="shoot('right')">➡ Phải</button>
</div>

<div id="info">
    Level: 1 | Score: 0
</div>

<script>
let level = 1;
let score = 0;
let speed = 2;

const keeper = document.getElementById("keeper");

// Thủ môn di chuyển liên tục
let direction = 1;
setInterval(() => {
    let left = keeper.offsetLeft;

    if (left <= 120) direction = 1;
    if (left >= 300) direction = -1;

    keeper.style.left = (left + direction * speed) + "px";
}, 50);

// Sút bóng
function shoot(dir) {
    const ball = document.getElementById("ball");

    let targetX;

    if (dir === "left") targetX = 120;
    if (dir === "center") targetX = 240;
    if (dir === "right") targetX = 340;

    ball.style.left = targetX + "px";
    ball.style.bottom = "250px";

    setTimeout(() => {
        let keeperX = keeper.offsetLeft;

        // kiểm tra cản phá
        if (Math.abs(keeperX - targetX) < 50) {
            alert("❌ Bị cản!");
        } else {
            alert("⚽ Ghi bàn!");
            score++;
            
            if (score % 3 === 0) {
                level++;
                speed += 0.5; // tăng độ khó
            }
        }

        document.getElementById("info").innerText =
            "Level: " + level + " | Score: " + score;

        // reset
        ball.style.bottom = "50px";
        ball.style.left = "240px";

    }, 400);
}
</script>

</body>
</html>
