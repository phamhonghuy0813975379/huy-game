<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Casino Dice Game</title>

<style>
body {
    text-align: center;
    background: #111;
    color: #fff;
    font-family: Arial;
}

button {
    margin: 5px;
    padding: 10px;
    font-size: 16px;
    cursor: pointer;
}

#dice {
    font-size: 40px;
    margin: 20px;
    transition: 0.2s;
}

.selected {
    background: gold;
    color: black;
}
</style>
</head>

<body>

<h2>🎰 Casino Xúc Xắc</h2>

<h3 id="money">💰 Coins: 100</h3>

<div id="buttons"></div>

<br>
<input type="number" id="bet" placeholder="Nhập tiền cược" min="1">
<br><br>

<button onclick="rollDice()">🎲 Lắc xúc xắc</button>

<h2 id="dice">🎲 🎲 🎲</h2>
<p id="result">Chọn số & cược đi!</p>

<script>
let selectedNumber = null;
let coins = 100;

// tạo nút 4 → 17
const container = document.getElementById("buttons");

for (let i = 4; i <= 17; i++) {
    let btn = document.createElement("button");
    btn.innerText = i;

    btn.onclick = () => {
        selectedNumber = i;

        // highlight nút
        document.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
    };

    container.appendChild(btn);
}

// 🎲 animation lắc
function animateDice(callback) {
    let count = 0;

    let interval = setInterval(() => {
        let r1 = Math.floor(Math.random()*6)+1;
        let r2 = Math.floor(Math.random()*6)+1;
        let r3 = Math.floor(Math.random()*6)+1;

        document.getElementById("dice").innerText =
            `🎲 ${r1} 🎲 ${r2} 🎲 ${r3}`;

        count++;
        if (count > 10) {
            clearInterval(interval);
            callback();
        }
    }, 100);
}

// 🎯 chơi
function rollDice() {
    let bet = parseInt(document.getElementById("bet").value);

    if (!selectedNumber) {
        alert("Chọn số!");
        return;
    }

    if (!bet || bet <= 0) {
        alert("Nhập tiền cược!");
        return;
    }

    if (bet > coins) {
        alert("Không đủ tiền!");
        return;
    }

    animateDice(() => {

        let d1 = Math.floor(Math.random()*6)+1;
        let d2 = Math.floor(Math.random()*6)+1;
        let d3 = Math.floor(Math.random()*6)+1;

        let total = d1 + d2 + d3;

        document.getElementById("dice").innerText =
            `🎲 ${d1} 🎲 ${d2} 🎲 ${d3} (Tổng: ${total})`;

        // 🎯 thưởng theo độ hiếm
        let rewardMultiplier = 2;

        if (total <= 6 || total >= 15) rewardMultiplier = 4; // hiếm
        if (total === 3 || total === 18) rewardMultiplier = 10; // cực hiếm

        if (total === selectedNumber) {
            let win = bet * rewardMultiplier;
            coins += win;
            document.getElementById("result").innerText =
                `🎉 Trúng! +${win} coins`;
        } else {
            coins -= bet;
            document.getElementById("result").innerText =
                `❌ Thua! -${bet} coins`;
        }

        document.getElementById("money").innerText =
            "💰 Coins: " + coins;

        // 💀 game over
        if (coins <= 0) {
            alert("💀 Hết tiền rồi!");
            coins = 100;
        }

    });
}
</script>

</body>
</html>
