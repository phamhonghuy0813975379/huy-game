<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Xúc Xắc</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #222;
    color: white;
}

button {
    margin: 5px;
    padding: 10px;
    font-size: 16px;
}

#dice {
    font-size: 30px;
    margin: 20px;
}
</style>
</head>

<body>

<h2>🎲 Game Đoán Tổng Xúc Xắc</h2>

<div id="buttons"></div>

<br>
<button onclick="rollDice()">🎯 Tung xúc xắc</button>

<h3 id="dice">🎲 🎲 🎲</h3>
<p id="result">Chọn số trước!</p>
<p id="score">Score: 0</p>

<script>
let selectedNumber = null;
let score = 0;

// tạo nút từ 4 → 17
const container = document.getElementById("buttons");
for (let i = 4; i <= 17; i++) {
    let btn = document.createElement("button");
    btn.innerText = i;
    btn.onclick = () => {
        selectedNumber = i;
        document.getElementById("result").innerText = "Bạn chọn: " + i;
    };
    container.appendChild(btn);
}

// tung xúc xắc
function rollDice() {
    if (selectedNumber === null) {
        alert("Chọn số trước!");
        return;
    }

    let d1 = Math.floor(Math.random() * 6) + 1;
    let d2 = Math.floor(Math.random() * 6) + 1;
    let d3 = Math.floor(Math.random() * 6) + 1;

    let total = d1 + d2 + d3;

    document.getElementById("dice").innerText =
        `🎲 ${d1} - 🎲 ${d2} - 🎲 ${d3} (Tổng: ${total})`;

    if (total === selectedNumber) {
        score += 5;
        document.getElementById("result").innerText = "🎉 Đúng! +5 điểm";
    } else {
        score -= 2;
        document.getElementById("result").innerText = "❌ Sai! -2 điểm";
    }

    document.getElementById("score").innerText = "Score: " + score;
}
</script>

</body>
</html>
