<!DOCTYPE html>
<html>
<head>
    <title>⚽ Game Penalty</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }
        button {
            padding: 15px;
            margin: 10px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h1>⚽ Penalty Game</h1>
    <h2>Điểm: <span id="score">0</span></h2>

    <p>Chọn hướng sút:</p>

    <button onclick="shoot('trai')">👈 Trái</button>
    <button onclick="shoot('giua')">👆 Giữa</button>
    <button onclick="shoot('phai')">👉 Phải</button>

    <h3 id="result"></h3>

    <script>
        let score = 0;

        function shoot(playerChoice) {

            let directions = ['trai', 'giua', 'phai'];
            let keeper = directions[Math.floor(Math.random() * 3)];

            if (playerChoice === keeper) {
                document.getElementById("result").innerText =
                    "❌ Bị cản! Thủ môn bắt: " + keeper + " → Game Over!";
                
                score = 0;
            } else {
                score++;
                document.getElementById("result").innerText =
                    "⚽ Ghi bàn! Thủ môn bắt: " + keeper;
            }

            document.getElementById("score").innerText = score;
        }
    </script>

</body>
</html>
